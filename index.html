<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MusicLens · 음악의 모든 장르를 탐험하다</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-base:#121212; --bg-surface:#181818; --bg-elevated:#1f1f1f; --bg-card:#252525;
  --text-primary:#ffffff; --text-secondary:#b3b3b3; --text-muted:#7c7c7c;
  --accent:#a855f7; --accent-dark:#7e22ce;
  --border-subtle:#4d4d4d; --border-muted:#2a2a2a;
  --shadow-heavy:rgba(0,0,0,0.5) 0px 8px 24px;
  --shadow-glow:0 0 0 3px rgba(168,85,247,.65), 0 24px 60px rgba(0,0,0,.75);
  --radius-pill:9999px; --radius-lg:8px;
  --font-ui:'DM Sans','Helvetica Neue',helvetica,arial,sans-serif;
  --cover:150px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:var(--font-ui); background:var(--bg-base); color:var(--text-primary);
  -webkit-font-smoothing:antialiased; overflow:hidden; position:relative;
}
button{font-family:inherit;cursor:pointer;border:none;}
a{color:inherit;text-decoration:none;}

.landing{height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden;}

/* ---------- ambient background blobs ---------- */
.ambient{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.blob{position:absolute;border-radius:50%;filter:blur(110px);opacity:.4;animation:drift 16s ease-in-out infinite;}
.blob.b1{width:480px;height:480px;background:#9b59b6;top:-140px;left:-80px;}
.blob.b2{width:420px;height:420px;background:#00D4FF;bottom:-160px;right:6%;animation-delay:-5s;}
.blob.b3{width:360px;height:360px;background:#a855f7;top:30%;right:36%;animation-delay:-9s;}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(50px,-40px) scale(1.12);}66%{transform:translate(-40px,30px) scale(.94);}}

/* ---------- top bar ---------- */
.top{position:relative;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:12px 40px 4px;}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:22px;}
.logo .mark{color:var(--accent);display:grid;place-items:center;}
.lang-toggle{display:flex;background:rgba(31,31,31,.7);border-radius:var(--radius-pill);padding:3px;backdrop-filter:blur(8px);}
.lang-toggle button{padding:7px 16px;border-radius:var(--radius-pill);font-size:12px;font-weight:700;letter-spacing:1.4px;color:var(--text-secondary);text-transform:uppercase;background:none;}
.lang-toggle button.active{background:var(--accent);color:#fff;}

/* ---------- hero copy ---------- */
.hero{position:relative;z-index:20;text-align:center;padding:0 24px 4px;flex-shrink:0;}
.hero .eyebrow{font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.hero h1{font-size:clamp(28px,4.4vw,50px);font-weight:700;line-height:1.05;letter-spacing:-1px;}
.hero p{font-size:clamp(13px,1.6vw,16px);color:var(--text-secondary);margin-top:10px;}
.hero .cta{display:inline-flex;align-items:center;gap:8px;margin-top:18px;background:linear-gradient(135deg, var(--accent), #06b6d4);color:#fff;font-weight:700;font-size:14px;padding:14px 34px;border-radius:var(--radius-pill);letter-spacing:1.4px;text-transform:uppercase;transition:transform .15s ease,box-shadow .15s;}
.hero .cta:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(168,85,247,0.45);}

/* ---------- cover wall ---------- */
.wall{position:relative;z-index:10;flex:1;display:flex;flex-direction:column;justify-content:center;gap:18px;padding:20px 0 28px;min-height:0;}
.wall-hint{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:25;font-size:12px;font-weight:600;letter-spacing:.5px;color:var(--text-muted);display:flex;align-items:center;gap:7px;}
.wall-hint .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1.6s ease infinite;}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}

.row{position:relative;height:var(--cover);overflow-x:clip;overflow-y:visible;}
.track{display:flex;gap:18px;width:max-content;will-change:transform;}
.track.left{animation:scroll-left var(--dur,60s) linear infinite;}
.track.right{animation:scroll-right var(--dur,60s) linear infinite;}
@keyframes scroll-left{from{transform:translateX(0);}to{transform:translateX(-50%);}}
@keyframes scroll-right{from{transform:translateX(-50%);}to{transform:translateX(0);}}
/* pause the row whose cover is hovered */
.row:hover .track{animation-play-state:paused;}

.cover {
  position:relative;width:var(--cover);height:var(--cover);flex-shrink:0;border-radius:var(--radius-lg);
  overflow:visible;cursor:pointer;
  transition:transform .4s cubic-bezier(.2,.8,.2,1), opacity .4s ease, filter .4s ease;
  transform-origin:center center;
  will-change:transform, opacity, filter;
}
.cover img{width:100%;height:100%;object-fit:cover;border-radius:var(--radius-lg);display:block;box-shadow:0 8px 20px rgba(0,0,0,.45);transition:box-shadow .4s ease;background:#252525;}

/* Depth-of-focus hover distortion: blur and shrink other covers */
.wall:hover .cover {
  opacity: 0.3;
  filter: blur(4px) grayscale(45%);
  transform: scale(0.82);
}
/* Disable pointer events on OTHER covers when one is hovered to prevent jitter */
.wall:has(.cover:hover) .cover:not(:hover) {
  pointer-events: none;
}
.wall .cover:hover {
  opacity: 1;
  filter: none;
  transform: scale(1.55); /* Optimize scale to prevent adjacent item overlap jitter */
  z-index: 60;
}
.cover:hover img{box-shadow:var(--shadow-glow);}

/* highlight card revealed on hover */
.cover .hl{
  position:absolute;left:50%;top:calc(100% + 7px);transform:translateX(-50%) translateY(6px);
  width:140px;background:rgba(18,18,18,.96);border:1px solid var(--border-muted);border-radius:6px;
  padding:8px 9px;opacity:0;pointer-events:none;transition:opacity .25s ease .05s,transform .25s ease .05s;
  box-shadow:var(--shadow-heavy);
}
.cover:hover .hl{opacity:1;transform:translateX(-50%) translateY(0) scale(.62);transform-origin:top center;}
.hl .hl-title{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hl .hl-artist{font-size:10px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.hl .hl-now{display:flex;align-items:center;gap:5px;margin-top:6px;font-size:8px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);}
.eq{display:inline-flex;align-items:flex-end;gap:2px;height:10px;}
.eq span{width:2px;background:var(--accent);border-radius:1px;animation:eqbar .9s ease-in-out infinite;}
.eq span:nth-child(1){animation-delay:-.2s;} .eq span:nth-child(2){animation-delay:-.5s;}
.eq span:nth-child(3){animation-delay:-.8s;} .eq span:nth-child(4){animation-delay:-.35s;}
@keyframes eqbar{0%,100%{height:3px;}50%{height:10px;}}
.hl-prog{margin-top:6px;height:3px;border-radius:2px;background:#333;overflow:hidden;}
.hl-prog .hl-fill{height:100%;width:0;background:var(--accent);border-radius:2px;}
.cover:hover .hl-fill{animation:hlrun 12s linear forwards;}
@keyframes hlrun{from{width:0;}to{width:100%;}}

/* ---------- footer ---------- */
.foot{position:relative;z-index:20;text-align:center;padding:0 24px 22px;color:var(--text-muted);font-size:12px;flex-shrink:0;}
.foot a{color:var(--text-secondary);font-weight:600;}
.foot a:hover{color:#fff;text-decoration:underline;}

@media(max-width:768px){
  .top{padding:10px 18px 2px;}
  .hero{padding:0 16px 2px;}
  .hero h1{letter-spacing:-.6px;}
  .wall{gap:14px;padding:16px 0 24px;}
  .row{height:var(--cover);}
  .track{gap:12px;}
  .cover:hover{transform:scale(1.6);}
  .cover .hl{width:118px;}
}
@media(prefers-reduced-motion:reduce){
  .track{animation:none!important;}
  .blob{animation:none!important;}
}
</style>
</head>
<body>
<div class="landing">
  <div class="ambient"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>

  <header class="top">
    <div class="logo">
      <span class="mark"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2.2"/><circle cx="11" cy="11" r="2.4" fill="currentColor"/><line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg></span>
      MusicLens
    </div>
    <div class="lang-toggle">
      <button id="lang-ko" class="active" onclick="setLang('ko')">KO</button>
      <button id="lang-en" onclick="setLang('en')">EN</button>
    </div>
  </header>

  <section class="hero">
    <div class="eyebrow" data-ko="MUSICLENS · 뮤직렌즈" data-en="MUSICLENS · EXPLORE">MUSICLENS · 뮤직렌즈</div>
    <h1 data-ko="음악의 모든 장르를 탐험하다" data-en="Explore Every Genre">음악의 모든 장르를 탐험하다</h1>
    <p data-ko="흐르는 앨범 위에 마우스를 올려 하이라이트를 미리 들어보세요" data-en="Hover any album to preview its highlight">흐르는 앨범 위에 마우스를 올려 하이라이트를 미리 들어보세요</p>
    <a class="cta" href="app.html" data-ko="MusicLens 들어가기 →" data-en="Enter MusicLens →">MusicLens 들어가기 →</a>
  </section>

  <main class="wall" id="wall">
    <div class="wall-hint"><span class="dot"></span><span data-ko="앨범 커버에 마우스를 올려보세요" data-en="Hover an album cover">앨범 커버에 마우스를 올려보세요</span></div>
  </main>

  <footer class="foot">
    <span data-ko="장르 탐색 · 차트 100 · 시대별 역사 · 장르 검색이 모두 안에 있어요" data-en="Genres · Chart 100 · Timeline · Search — all inside">장르 탐색 · 차트 100 · 시대별 역사 · 장르 검색이 모두 안에 있어요</span>
    &nbsp;·&nbsp;<a href="app.html" data-ko="바로 입장" data-en="Go now">바로 입장</a>
  </footer>
</div>

<script src="covers.js"></script>
<script>
let currentLang = 'ko';
const ART = 'playlist-artwork/';
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function coverHTML(c){
  const title = c.title && c.title!=='...' ? c.title : c.artist;
  const artist = (c.title && c.title!=='...' && c.artist && c.artist!=='MusicLens') ? c.artist : 'MusicLens';
  return `<div class="cover">
    <img loading="lazy" src="${ART}${encodeURIComponent(c.f)}" alt="${esc(title)}"
         onerror="this.style.background='linear-gradient(135deg,#FF6B9D,#00D4FF)';this.removeAttribute('src');">
    <div class="hl">
      <div class="hl-title">${esc(title)}</div>
      <div class="hl-artist">${esc(artist)}</div>
      <div class="hl-now">
        <span class="eq"><span></span><span></span><span></span><span></span></span>
        <span data-ko="하이라이트 재생 중" data-en="Playing highlight">하이라이트 재생 중</span>
      </div>
      <div class="hl-prog"><div class="hl-fill"></div></div>
    </div>
  </div>`;
}

function buildRow(items, dir, dur){
  // duplicate items for seamless loop
  const inner = items.concat(items).map(coverHTML).join('');
  return `<div class="row"><div class="track ${dir}" style="--dur:${dur}s">${inner}</div></div>`;
}

function shuffle(a){const x=a.slice();for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];}return x;}

const ROWS = 3, GAP = 18;
function buildWall(){
  const wall = document.getElementById('wall');
  const pool = shuffle(COVERS);
  const per = Math.ceil(pool.length / ROWS);
  let html = '';
  const dirs = ['left','right','left'];
  const durs = [62, 78, 70];
  for(let r=0;r<ROWS;r++){
    const slice = pool.slice(r*per, (r+1)*per);
    if(slice.length) html += buildRow(slice, dirs[r], durs[r]);
  }
  wall.insertAdjacentHTML('beforeend', html);
  sizeCovers();
}
// fit ROWS rows into the available wall height; hover scale still pops out (overflow-y visible)
function sizeCovers(){
  const wall = document.getElementById('wall');
  const avail = wall.clientHeight - (ROWS-1)*GAP - 48; /* leave hint room */
  let size = Math.floor(avail / ROWS);
  size = Math.max(92, Math.min(176, size));
  document.documentElement.style.setProperty('--cover', size + 'px');
}
let rT; window.addEventListener('resize', ()=>{clearTimeout(rT);rT=setTimeout(sizeCovers,150);});

function setLang(lang){
  currentLang = lang;
  document.getElementById('lang-ko').classList.toggle('active', lang==='ko');
  document.getElementById('lang-en').classList.toggle('active', lang==='en');
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-ko]').forEach(el=>{el.textContent = lang==='ko'?el.dataset.ko:el.dataset.en;});
}

buildWall();
setLang('ko');
</script>
</body>
</html>
