<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MusicLens · 음악의 모든 장르를 탐험하다</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===================== BASE RESET ===================== */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;margin:0;padding:0;}
body{
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  position:relative;
  background:#121212;
  width:100%;
  height:100%;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
a{color:inherit;text-decoration:none;}

/* ===================== LANDING SCREEN STYLES ===================== */
.landing-screen {
  --bg-base:#121212; --bg-surface:#181818; --bg-elevated:#1f1f1f; --bg-card:#252525;
  --text-primary:#ffffff; --text-secondary:#b3b3b3; --text-muted:#7c7c7c;
  --accent:#a855f7; --accent-dark:#7e22ce;
  --border-subtle:#4d4d4d; --border-muted:#2a2a2a;
  --shadow-heavy:rgba(0,0,0,0.5) 0px 8px 24px;
  --shadow-glow:0 0 0 3px rgba(168,85,247,.65), 0 24px 60px rgba(0,0,0,.75);
  --radius-pill:9999px; --radius-lg:8px;
  --font-ui:'DM Sans','Helvetica Neue',helvetica,arial,sans-serif;
  --cover:150px;

  font-family:var(--font-ui); background:var(--bg-base); color:var(--text-primary);
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 100;
  transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), filter 1.2s cubic-bezier(0.16, 1, 0.3, 1);
  transform-origin: center center;
}

/* Immersive Zoom portal exiting state */
.landing-screen.exiting {
  transform: scale(1.15) translateY(-5vh);
  opacity: 0;
  filter: blur(15px);
  pointer-events: none;
}

.landing-screen .ambient{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.landing-screen .blob{position:absolute;border-radius:50%;filter:blur(110px);opacity:.4;animation:drift 16s ease-in-out infinite;}
.landing-screen .blob.b1{width:480px;height:480px;background:#9b59b6;top:-140px;left:-80px;}
.landing-screen .blob.b2{width:420px;height:420px;background:#00D4FF;bottom:-160px;right:6%;animation-delay:-5s;}
.landing-screen .blob.b3{width:360px;height:360px;background:#a855f7;top:30%;right:36%;animation-delay:-9s;}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(50px,-40px) scale(1.12);}66%{transform:translate(-40px,30px) scale(.94);}}

.landing-screen .landing-top{position:relative;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:16px 40px 4px;}
.landing-screen .landing-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:22px;}
.landing-screen .landing-logo .mark{color:var(--accent);display:grid;place-items:center;}
.landing-screen .lang-toggle-landing{display:flex;background:rgba(31,31,31,.7);border-radius:var(--radius-pill);padding:3px;backdrop-filter:blur(8px);}
.landing-screen .lang-toggle-landing button{padding:7px 16px;border-radius:var(--radius-pill);font-size:12px;font-weight:700;letter-spacing:1.4px;color:var(--text-secondary);text-transform:uppercase;background:none;border:none;cursor:pointer;}
.landing-screen .lang-toggle-landing button.active{background:var(--accent);color:#fff;}

.landing-screen .hero-landing{position:relative;z-index:20;text-align:center;padding:0 24px 4px;flex-shrink:0;transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);}
.landing-screen .hero-landing .eyebrow{font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.landing-screen .hero-landing h1{font-size:clamp(28px,4.4vw,50px);font-weight:700;line-height:1.05;letter-spacing:-1px;}
.landing-screen .hero-landing p{font-size:clamp(13px,1.6vw,16px);color:var(--text-secondary);margin-top:10px;}
.landing-screen .hero-landing .cta{display:inline-flex;align-items:center;gap:8px;margin-top:18px;background:linear-gradient(135deg, var(--accent), #06b6d4);color:#fff;font-weight:700;font-size:14px;padding:14px 34px;border-radius:var(--radius-pill);letter-spacing:1.4px;text-transform:uppercase;transition:transform .15s ease,box-shadow .15s;border:none;cursor:pointer;}
.landing-screen .hero-landing .cta:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(168,85,247,0.45);}

.landing-screen .landing-wall{position:relative;z-index:10;flex:1;display:flex;flex-direction:column;justify-content:center;gap:18px;padding:20px 0 28px;min-height:0;transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);}
.landing-screen .wall-hint{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:25;font-size:12px;font-weight:600;letter-spacing:.5px;color:var(--text-muted);display:flex;align-items:center;gap:7px;}
.landing-screen .wall-hint .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1.6s ease infinite;}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}

.landing-screen .landing-row{position:relative;height:var(--cover);overflow-x:clip;overflow-y:visible;}
.landing-screen .landing-track{display:flex;gap:18px;width:max-content;will-change:transform;}
.landing-screen .landing-track.left{animation:scroll-left var(--dur,60s) linear infinite;}
.landing-screen .landing-track.right{animation:scroll-right var(--dur,60s) linear infinite;}
@keyframes scroll-left{from{transform:translateX(0);}to{transform:translateX(-50%);}}
@keyframes scroll-right{from{transform:translateX(-50%);}to{transform:translateX(0);}}
.landing-screen .landing-row:hover .landing-track{animation-play-state:paused;}

.landing-screen .landing-cover {
  position:relative;width:var(--cover);height:var(--cover);flex-shrink:0;border-radius:var(--radius-lg);
  overflow:visible;cursor:pointer;
  transition:transform .4s cubic-bezier(.2,.8,.2,1), opacity .4s ease, filter .4s ease;
  transform-origin:center center;
  will-change:transform, opacity, filter;
}
.landing-screen .landing-cover img{width:100%;height:100%;object-fit:cover;border-radius:var(--radius-lg);display:block;box-shadow:0 8px 20px rgba(0,0,0,.45);transition:box-shadow .4s ease;background:#252525;}

.landing-screen .landing-wall:hover .landing-cover {
  opacity: 0.3;
  filter: blur(4px) grayscale(45%);
  transform: scale(0.82);
}
.landing-screen .landing-wall:has(.landing-cover:hover) .landing-cover:not(:hover) {
  pointer-events: none;
}
.landing-screen .landing-wall .landing-cover:hover {
  opacity: 1;
  filter: none;
  transform: scale(1.55);
  z-index: 60;
}
.landing-screen .landing-wall .landing-cover:hover img{box-shadow:var(--shadow-glow);}

.landing-screen .landing-hl{
  position:absolute;left:50%;top:calc(100% + 7px);transform:translateX(-50%) translateY(6px);
  width:140px;background:rgba(18,18,18,.96);border:1px solid var(--border-muted);border-radius:6px;
  padding:8px 9px;opacity:0;pointer-events:none;transition:opacity .25s ease .05s,transform .25s ease .05s;
  box-shadow:var(--shadow-heavy);
}
.landing-screen .landing-wall .landing-cover:hover .landing-hl{opacity:1;transform:translateX(-50%) translateY(0) scale(.62);transform-origin:top center;}
.landing-screen .landing-hl-title{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.landing-screen .landing-hl-artist{font-size:10px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.landing-screen .landing-hl-now{display:flex;align-items:center;gap:5px;margin-top:6px;font-size:8px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);}
.landing-screen .landing-eq{display:inline-flex;align-items:flex-end;gap:2px;height:10px;}
.landing-screen .landing-eq span{width:2px;background:var(--accent);border-radius:1px;animation:eqbar .9s ease-in-out infinite;}
.landing-screen .landing-eq span:nth-child(1){animation-delay:-.2s;} .landing-screen .landing-eq span:nth-child(2){animation-delay:-.5s;}
.landing-screen .landing-eq span:nth-child(3){animation-delay:-.8s;} .landing-screen .landing-eq span:nth-child(4){animation-delay:-.35s;}
@keyframes eqbar{0%,100%{height:3px;}50%{height:10px;}}
.landing-screen .landing-hl-prog{margin-top:6px;height:3px;border-radius:2px;background:#333;overflow:hidden;}
.landing-screen .landing-hl-fill{height:100%;width:0;background:var(--accent);border-radius:2px;}
.landing-screen .landing-wall .landing-cover:hover .landing-hl-fill{animation:hlrun 12s linear forwards;}
@keyframes hlrun{from{width:0;}to{width:100%;}}

.landing-screen .landing-foot{position:relative;z-index:20;text-align:center;padding:0 24px 64px;color:var(--text-muted);font-size:12px;margin-top:auto;flex-shrink:0;}
.landing-screen .landing-foot a{color:var(--text-secondary);font-weight:600;}
.landing-screen .landing-foot a:hover{color:#fff;text-decoration:underline;}

.landing-screen .scroll-indicator {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  animation: fadeInOut 2s ease infinite;
  pointer-events: none;
}
.landing-screen .scroll-indicator svg.bounce {
  animation: bounce 1.6s ease infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(6px); }
}
@keyframes fadeInOut {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}

@media(max-width:768px){
  .landing-screen .landing-top{padding:10px 18px 2px;}
  .landing-screen .hero-landing{padding:0 16px 2px;}
  .landing-screen .hero-landing h1{letter-spacing:-.6px;}
  .landing-screen .landing-wall{gap:14px;padding:16px 0 24px;}
  .landing-screen .landing-cover:hover{transform:scale(1.6);}
  .landing-screen .landing-hl{width:118px;}
}
@media(prefers-reduced-motion:reduce){
  .landing-screen .landing-track{animation:none!important;}
  .landing-screen .blob{animation:none!important;}
}

/* ===================== APP SCREEN STYLES ===================== */
.app-screen {
  --bg-base:#000000; 
  --bg-surface:#0a0a0a; 
  --bg-elevated:#121212; 
  --bg-card:#181818;
  --text-primary:#ffffff; --text-secondary:#8a8a8a; --text-muted:#555555;
  --accent:#ffffff; --accent-dark:#262626; --accent-cyan:#e5e5e5;
  --accent-gradient:linear-gradient(135deg, #ffffff, #8a8a8a);
  --color-error:#ffffff; --color-warning:#8a8a8a; --color-info:#555555;
  --border-subtle:#262626; --border-muted:#141414;
  --shadow-heavy:none;
  --shadow-medium:none;
  --shadow-glow:none;
  --radius-sm:0px; --radius-md:0px; --radius-lg:0px;
  --radius-pill:0px; --radius-circle:0px;
  --font-ui:'Inter','Helvetica Neue',helvetica,arial,sans-serif;
  --font-mono:'Courier New',Courier,monospace;
  --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px;
  --space-5:20px; --space-6:24px; --space-8:32px;
  --header-h:72px; --vibe-drawer-w:400px;

  font-family:var(--font-ui); background:var(--bg-base); color:var(--text-primary);
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100vh;
  z-index: 50;
  transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), filter 1.2s cubic-bezier(0.16, 1, 0.3, 1);
  transform-origin: center center;
}

.app-screen.hidden {
  display: none !important;
  opacity: 0;
  transform: scale(0.92) translateY(5vh);
  filter: blur(15px);
}

.app-screen.entering {
  display: block !important;
  animation: appEnter 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.app-screen.exiting-app {
  animation: appExit 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes appEnter {
  from { opacity: 0; transform: scale(0.92) translateY(5vh); filter: blur(15px); }
  to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
}
@keyframes appExit {
  from { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
  to { opacity: 0; transform: scale(0.92) translateY(5vh); filter: blur(15px); }
}

.app-screen ::-webkit-scrollbar{width:8px;height:8px;}
.app-screen ::-webkit-scrollbar-thumb{background:#262626;border-radius:0px;}
.app-screen ::-webkit-scrollbar-thumb:hover{background:#404040;}
.app-screen ::-webkit-scrollbar-track{background:transparent;}

.app-screen .app-container{
  display:flex; flex-direction:column; height:100vh; position:relative; z-index:1;
}
.app-screen .global-header{
  height:var(--header-h); display:flex; align-items:center; justify-content:space-between;
  padding:0 var(--space-6); background:rgba(0, 0, 0, 0.8); backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px); border-bottom:1px solid var(--border-subtle);
  position:sticky; top:0; z-index:40; transition:background .2s;
}
.app-screen .global-header.scrolled{background:#000000;}
.app-screen .header-left{display:flex; align-items:center; gap:var(--space-6);}
.app-screen .header-right{display:flex; align-items:center; gap:var(--space-4);}

.app-screen .nav-logo{display:flex;align-items:center;gap:var(--space-2);font-family:var(--font-mono);font-weight:700;font-size:18px;letter-spacing:1px;}
.app-screen .nav-logo .logo-mark{color:#ffffff;display:grid;place-items:center;}
.app-screen .topbar-nav{display:flex;gap:var(--space-2);}
.app-screen .topbar-nav button{
  width:32px;height:32px;border-radius:0px;font-family:var(--font-mono);
  background:#0a0a0a; display:grid;place-items:center;color:var(--text-secondary);
  border:1px solid var(--border-subtle); transition:background .15s, color .15s;
}
.app-screen .topbar-nav button:hover{color:#fff; background:#161616; border-color:#8a8a8a;}

.app-screen .header-nav{display:flex; gap:var(--space-1); align-items:center;}
.app-screen .header-nav .nav-link{
  display:flex;align-items:center;gap:8px;padding:6px 14px;
  border-radius:0px;color:var(--text-secondary);font-family:var(--font-mono);font-weight:600;font-size:12px;
  transition:color .15s,background .15s, border-color .15s;
  border:1px solid transparent;
}
.app-screen .header-nav .nav-link:hover{color:#fff; background:#161616; border-color:#262626;}
.app-screen .header-nav .nav-link.active{
  color:#fff; background:#222222; border-color:#ffffff;
}
.app-screen .header-nav .nav-link.active .nav-ic{color:#ffffff;}
.app-screen .nav-ic{display:grid;place-items:center;width:18px;height:18px;flex-shrink:0;}

.app-screen .main-content{
  flex:1; overflow-y:auto; position:relative;
}
.app-screen .main-inner{padding:var(--space-6) var(--space-6) 80px;max-width:1300px;margin:0 auto;}

.app-screen .lang-toggle-app{display:flex;background:#0d0d0d;border-radius:0px;padding:0px;border:1px solid var(--border-subtle);}
.app-screen .lang-toggle-app button{
  padding:6px 12px;border-radius:0px;font-family:var(--font-mono);font-size:11px;font-weight:700;
  letter-spacing:1px;color:var(--text-secondary);text-transform:uppercase; transition:background .15s, color .15s;
}
.app-screen .lang-toggle-app button.active{background:#ffffff;color:#000000;}

.app-screen .btn-primary{
  background:#ffffff;color:#000000;font-family:var(--font-mono);font-weight:700;font-size:12px;
  padding:12px 28px;border-radius:0px;letter-spacing:1px;text-transform:uppercase;
  transition:background .15s, color .15s; display:inline-block; border:1px solid #ffffff; text-align:center;
}
.app-screen .btn-primary:hover{background:#000000;color:#ffffff;border-color:#ffffff;}
.app-screen .btn-secondary{
  background:#0a0a0a;color:#ffffff;font-family:var(--font-mono);font-weight:700;font-size:11px;
  padding:9px 18px;border-radius:0px;letter-spacing:0.8px;text-transform:uppercase;
  transition:background .15s, border-color .15s; border:1px solid var(--border-subtle);
}
.app-screen .btn-secondary:hover{background:#161616;border-color:#ffffff;}
.app-screen .btn-outlined{
  border:1px solid var(--border-subtle);color:var(--text-secondary);font-family:var(--font-mono);font-weight:600;font-size:11px;
  padding:7px 16px;border-radius:0px;transition:border-color .15s,color .15s,background .15s;
}
.app-screen .btn-outlined:hover{border-color:#fff;color:#fff;background:#111111;}
.app-screen .btn-outlined.active{border-color:#ffffff;color:#ffffff;background:#1a1a1a;}

.app-screen .btn-play{
  width:44px;height:44px;border-radius:0px;background:#ffffff;
  color:#000000;display:grid;place-items:center;transition:background .15s, color .15s;
  border:1px solid #ffffff;
}
.app-screen .btn-play:hover{background:#000000;color:#ffffff;}
.app-screen .btn-play.sm{width:32px;height:32px;}
.app-screen .btn-play.sm svg{width:14px;height:14px;}
.app-screen .btn-icon{width:36px;height:36px;border-radius:0px;display:grid;place-items:center;color:var(--text-secondary);transition:color .15s,background .15s; border:1px solid transparent;}
.app-screen .btn-icon:hover{color:#fff;background:#111111;border-color:var(--border-subtle);}

.app-screen .section{margin-bottom:var(--space-8);}
.app-screen .section-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:var(--space-4);}
.app-screen .section-title{font-size:22px;font-weight:700;letter-spacing:-0.5px;}
.app-screen .section-subtitle{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);margin-top:4px;}
.app-screen .see-all{font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);transition:color .15s;}
.app-screen .see-all:hover{color:#ffffff;text-decoration:underline;}

.app-screen .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-5);}
.app-screen .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-5);}
.app-screen .horizontal-scroll{display:flex;gap:var(--space-4);overflow-x:auto;padding-bottom:var(--space-3);scroll-snap-type:x proximity;}
.app-screen .horizontal-scroll>*{scroll-snap-align:start;}

.app-screen .hero-app{
  position:relative;border-radius:0px;overflow:hidden;padding:48px var(--space-6);
  margin-bottom:var(--space-6); isolation:isolate;
  background:#0a0a0a; border:1px solid var(--border-subtle);
}
.app-screen .hero-app h1{font-size:clamp(28px,4.5vw,46px);font-weight:700;line-height:1.1;letter-spacing:-1.5px;max-width:640px;}
.app-screen .hero-app p{font-family:var(--font-mono);font-size:13px;color:var(--text-secondary);margin:var(--space-3) 0 var(--space-5);max-width:480px;line-height:1.5;letter-spacing:-0.2px;}

.app-screen .genre-card{
  position:relative;border-radius:0px;overflow:hidden;padding:var(--space-4) var(--space-5);
  min-height:180px;display:flex;flex-direction:column;justify-content:space-between;
  cursor:pointer;transition:border-color .2s, background-color .2s;
  border:1px solid var(--border-subtle);
  background:#0a0a0a !important;
}
.app-screen .genre-card>*{position:relative;z-index:1;}
.app-screen .genre-card:hover{border-color:#ffffff;background:#111111 !important;}
.app-screen .genre-card .gc-emoji{font-family:var(--font-mono);font-size:24px;color:#ffffff;}
.app-screen .genre-card .gc-name{font-size:20px;font-weight:700;}
.app-screen .genre-card .gc-name small{font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--text-secondary);display:block;margin-top:2px;}
.app-screen .genre-card .gc-sub{font-family:var(--font-mono);font-size:10px;font-weight:500;color:var(--text-secondary);line-height:1.5;min-height:33px;margin-top:8px;}
.app-screen .genre-card .gc-foot{display:flex;align-items:center;justify-content:space-between;gap:var(--space-2);margin-top:auto;}
.app-screen .listeners-bar{flex:1;}
.app-screen .listeners-bar .lb-track{height:4px;border-radius:0px;background:#1a1a1a;overflow:hidden;margin-bottom:4px;}
.app-screen .listeners-bar .lb-fill{height:100%;background:#ffffff;border-radius:0px;}
.app-screen .listeners-bar .lb-label{font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--text-secondary);}
.app-screen .gc-go{background:#161616;border:1px solid var(--border-subtle);color:#fff;font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;padding:6px 12px;border-radius:0px;white-space:nowrap; transition:background .15s, border-color .15s;}
.app-screen .gc-go:hover{background:#262626;border-color:#ffffff;}
.app-screen .gc-artists{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);line-height:1.5;}

.app-screen .song-card{

/* ===================== PREMIUM DENSITY ADDITIONS ===================== */
.app-screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
  z-index: 0;
}
.app-screen .global-header {
  background: rgba(0, 0, 0, 0.65) !important;
  backdrop-filter: blur(24px) saturate(180%) !important;
  -webkit-backdrop-filter: blur(24px) saturate(180%) !important;
}
.app-screen .vibe-analyzer {
  background: rgba(8, 8, 8, 0.75) !important;
  backdrop-filter: blur(32px) saturate(150%) !important;
  -webkit-backdrop-filter: blur(32px) saturate(150%) !important;
}
.app-screen .mobile-nav {
  background: rgba(0, 0, 0, 0.75) !important;
  backdrop-filter: blur(20px) !important;
  -webkit-backdrop-filter: blur(20px) !important;
}
.app-screen .song-card {
  position: relative;
}
.app-screen .sc-tooltip {
  position: absolute;
  top: 10px;
  left: 10px;
  right: 10px;
  background: rgba(0, 0, 0, 0.95);
  border: 1px solid var(--border-subtle);
  padding: 6px 8px;
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-secondary);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s ease;
  transform: translateY(-4px);
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 3px;

/* ===================== STATE & TRANSITIONS ===================== */
let currentLang = 'ko';
let transitioned = false;
let isTransitioning = false;
const ART = 'playlist-artwork/';

function transitionToApp() {
  if (transitioned || isTransitioning) return;
  isTransitioning = true;
  transitioned = true;
  
  const landing = document.getElementById('landing-screen');
  const app = document.getElementById('app-screen');
  
  landing.classList.add('exiting');
  app.classList.remove('hidden');
  app.classList.add('entering');
  
  // Set window hash to home to trigger routing if empty
  if (!location.hash || location.hash === '#') {
    location.hash = '#home';
  } else {
    handleRoute();
  }
  
  setTimeout(() => {
    landing.style.display = 'none';
    app.classList.remove('entering');
    isTransitioning = false;
  }, 1200);
}

function transitionToLanding() {
  if (!transitioned || isTransitioning) return;
  isTransitioning = true;
  transitioned = false;
  
  const landing = document.getElementById('landing-screen');
  const app = document.getElementById('app-screen');
  
  landing.style.display = 'flex';
  // Force browser reflow to enable animation restart
  landing.offsetHeight;
  
  landing.classList.remove('exiting');
  app.classList.add('exiting-app');
  
  // Close vibe analyzer if open
  closeVibeAnalyzer();
  
  // Clear hash
  history.pushState("", document.title, window.location.pathname + window.location.search);
  
  setTimeout(() => {
    app.classList.add('hidden');
    app.classList.remove('exiting-app');
    sizeCovers(); // resize cover sizes to match window
    isTransitioning = false;
  }, 1200);
}

// Global language changer for BOTH panels
function changeLanguage(lang) {
  currentLang = lang;
  
  document.getElementById('lang-ko-landing').classList.toggle('active', lang==='ko');
  document.getElementById('lang-en-landing').classList.toggle('active', lang==='en');
  document.getElementById('lang-ko-app').classList.toggle('active', lang==='ko');
  document.getElementById('lang-en-app').classList.toggle('active', lang==='en');
  
  document.documentElement.lang = lang;
  
  document.querySelectorAll('[data-ko]').forEach(el => {
    if (el.classList.contains('feed-text')) {
      el.innerHTML = lang === 'ko' ? el.dataset.ko : el.dataset.en;
    } else {
      el.textContent = lang === 'ko' ? el.dataset.ko : el.dataset.en;
    }
  });
  
  if (transitioned) {
    handleRoute();
  }
}

/* ===================== SCROLL AND GESTURE EVENT LISTENERS ===================== */
window.addEventListener('wheel', (e) => {
  if (isTransitioning) {
    e.preventDefault();
    return;
  }
  
  if (!transitioned && e.deltaY > 12) {
    e.preventDefault();
    transitionToApp();
  }
}, { passive: false });

// Key down listener
window.addEventListener('keydown', (e) => {
  if (isTransitioning) return;
  if (!transitioned && ['ArrowDown', 'PageDown', ' ', 'Enter'].includes(e.key)) {
    e.preventDefault();
    transitionToApp();
  }
});

// Swipe support for mobile
let touchStartY = 0;
window.addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });

window.addEventListener('touchmove', (e) => {
  if (isTransitioning) return;
  if (!touchStartY) return;
  const touchEndY = e.touches[0].clientY;
  const diffY = touchStartY - touchEndY;
  
  if (!transitioned && diffY > 48) { // Swiped up on landing
    transitionToApp();
    touchStartY = 0;
  }
}, { passive: true });

window.addEventListener('touchend', () => {
  touchStartY = 0;
});

  const artist = (c.title && c.title!=='...' && c.artist && c.artist!=='MusicLens') ? c.artist : 'MusicLens';

function buildRow(items, dir, dur){

  return `<div class="landing-row"><div class="landing-track ${dir}" style="--dur:${dur}s">${inner}</div></div>`;

function shuffle(a){const x=a.slice();for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];}return x;}

const ROWS = 3, GAP = 18;
function buildWall(){
  const wall = document.getElementById('landing-wall');
  // clear previous rows if rebuild is triggered
  const hints = wall.querySelectorAll('.wall-hint');
  wall.innerHTML = '';
  hints.forEach(h => wall.appendChild(h));
  
  const pool = shuffle(COVERS);
  const per = Math.ceil(pool.length / ROWS);
  let html = '';
  const dirs = ['left','right','left'];
  const durs = [62, 78, 70];
  for(let r=0;r<ROWS;r++){
    const slice = pool.slice(r*per, (r+1)*per);
    if(slice.length) html += buildRow(slice, dirs[r], durs[r]);
  }
  wall.insertAdjacentHTML('beforeend', html);
  sizeCovers();
}

function sizeCovers(){
  const wall = document.getElementById('landing-wall');
  if(!wall || wall.clientHeight === 0) return;
  const avail = wall.clientHeight - (ROWS-1)*GAP - 48; /* leave hint room */
  let size = Math.floor(avail / ROWS);
  size = Math.max(92, Math.min(176, size));
  document.documentElement.style.setProperty('--cover', size + 'px');
}

let rT; window.addEventListener('resize', ()=>{clearTimeout(rT);rT=setTimeout(sizeCovers,150);});

  const g = genreById(id);
  if (!g) return;
  
  // Dim all nodes and lines
  map.querySelectorAll('.map-node').forEach(n => {
    n.classList.add('dimmed');
    n.classList.remove('connected', 'highlighted');
  });
  
  map.querySelectorAll('.map-link').forEach(l => {
    l.classList.add('dimmed');
    l.classList.remove('highlighted');
  });
  
  // Highlight current node
  const currentNode = map.querySelector(`.map-node[data-id="${id}"]`);
  if (currentNode) {
    currentNode.classList.remove('dimmed');
    currentNode.classList.add('highlighted');

  // Find related ids
  const relations = (g.relatedGenres || []).concat(g.alsoListenTo || []);

function resetMapHighlight() {
  const map = document.getElementById('genre-network-svg');
  if (!map) return;
  
  map.querySelectorAll('.map-node').forEach(n => {
    n.classList.remove('dimmed', 'highlighted', 'connected');
  });
  
  map.querySelectorAll('.map-link').forEach(l => {
    l.classList.remove('dimmed', 'highlighted');
  });
  
  const card = document.getElementById('map-desc-card');
  if (card) {
    card.style.opacity = 0.5;
    card.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:12px; padding:20px 0;">${t('장르 노드에 마우스를 올리면 연결 정보와 세부 설명이 표시됩니다.','Hover over a genre node to view connections and details.')}</div>`;

function renderGenres(){
  let list = [...GENRES];
  if(genreSort==='era') list.sort((a,b)=>parseInt(a.eraOrigin)-parseInt(b.eraOrigin));
  else if(genreSort==='popular') list.sort((a,b)=>b.listeners-a.listeners);
  else if(genreSort==='alpha') list.sort((a,b)=>a.name.localeCompare(b.name));
  
  const filters = [['all','전체','All'],['era','시대순','By era'],['popular','인기순','Popular'],['alpha','알파벳순','A-Z']];
  
  const toggleHTML = `
    <div class="view-toggle-bar" style="margin-bottom: var(--space-4); display: flex; gap: 8px;">
      <button class="btn-outlined ${genreView==='grid'?'active':''}" onclick="setGenreView('grid')" style="font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; padding:6px 14px;">${t('리스트 뷰','Grid List')}</button>
      <button class="btn-outlined ${genreView==='map'?'active':''}" onclick="setGenreView('map')" style="font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; padding:6px 14px;">${t('관계도 맵 뷰','Lineage Map')}</button>
    </div>
  `;
  
  let html = '';
  if (genreView === 'grid') {
    html = `<div class="view">
      <div class="section-head" style="margin-bottom:var(--space-5)"><div><div class="section-title">${t('장르 탐색','Explore Genres')}</div><div class="section-subtitle">${t('15개 장르, 무한한 발견','15 genres, infinite discovery')}</div></div></div>
      ${toggleHTML}
      <div class="filter-bar">${filters.map(([k,ko,en])=>`<button class="btn-outlined ${genreSort===k?'active':''}" onclick="genreSort='${k}';renderGenres()">${t(ko,en)}</button>`).join('')}</div>
      <div class="grid-3">${list.map(genreGridCardHTML).join('')}</div>
    </div>`;
  } else {
    // Generate links
    let linesHTML = '';
    const drawn = new Set();
    GENRES.forEach(g => {
      const coordsA = GENRE_MAP_COORDS[g.id];
      if (!coordsA) return;
      const relations = (g.relatedGenres || []).concat(g.alsoListenTo || []);
      relations.forEach(relId => {
        const coordsB = GENRE_MAP_COORDS[relId];
        if (!coordsB) return;
        const key = [g.id, relId].sort().join('-');
        if (!drawn.has(key)) {
          drawn.add(key);
          linesHTML += `<line class="map-link" data-from="${g.id}" data-to="${relId}" x1="${coordsA.x}" y1="${coordsA.y}" x2="${coordsB.x}" y2="${coordsB.y}" style="--link-color:${g.color};" />`;
        }
      });
    });

    // Generate nodes
    let nodesHTML = '';
    GENRES.forEach(g => {
      const coords = GENRE_MAP_COORDS[g.id];
      if (!coords) return;
      nodesHTML += `
        <g class="map-node" data-id="${g.id}" onclick="location.hash='#genre/${g.id}'" onmouseenter="highlightMapNode('${g.id}')" onmouseleave="resetMapHighlight()" style="--node-color:${g.color};">
          <circle class="glow" cx="${coords.x}" cy="${coords.y}" r="25" fill="${g.color}10" stroke="${g.color}" stroke-width="1.2" />
          <circle cx="${coords.x}" cy="${coords.y}" r="15" fill="${g.color}25" />
          <text x="${coords.x}" y="${coords.y + 5}" font-size="13" text-anchor="middle" style="user-select:none; pointer-events:none;">${g.emoji}</text>
          <text class="node-label" x="${coords.x}" y="${coords.y + 38}" fill="#ffffff" font-size="9.5" font-weight="700" text-anchor="middle" style="user-select:none; pointer-events:none; text-shadow: 0 1px 3px rgba(0,0,0,0.85);">${t(g.nameKo, g.name)}</text>
        </g>
      `;
    });

    html = `<div class="view">
      <div class="section-head" style="margin-bottom:var(--space-5)"><div><div class="section-title">${t('장르 관계도 맵','Genre Lineage Map')}</div><div class="section-subtitle">${t('장르 간의 음악적 연결성과 유사도를 인터랙티브하게 탐험해 보세요.','Interactive sound networks mapping out audio kinship.')}</div></div></div>
      ${toggleHTML}
      
      <div style="display:flex; flex-direction:column; gap:var(--space-4);">
        <div style="background:#050505; border:1px solid var(--border-subtle); padding:var(--space-3); overflow-x:auto; position:relative; z-index:1;">
          <svg id="genre-network-svg" width="800" height="420" viewBox="0 0 800 420" style="display:block; margin:0 auto; max-width:100%; overflow:visible;">
            <rect width="800" height="420" fill="none" />
            <g>${linesHTML}</g>
            <g>${nodesHTML}</g>
          </svg>
        </div>
        
        <div id="map-desc-card" class="map-desc-card" style="opacity: 0.5;">
          <div style="text-align:center; color:var(--text-muted); font-size:12px; padding:20px 0;">
            ${t('장르 노드에 마우스를 올리면 연결 정보와 세부 설명이 표시됩니다.','Hover over a genre node to view connections and details.')}
          </div>
        </div>
      </div>
    </div>`;
  }
  
  document.getElementById('view-root').innerHTML = html;
  applyLang();
}

let searchQuery = '';
const AI_RULES = [
  {keys:['빠르','시끄','기타','fast','loud','guitar'],genres:['rock','metal','punk'],ko:'빠르고 강렬한 기타 사운드네요',en:'Sounds like fast, intense guitar music'},
  {keys:['느리','감성','슬프','slow','emotional','sad','mellow'],genres:['indie','jazz','rnb'],ko:'느리고 감성적인 분위기예요',en:'A slow, emotional mood'},
  {keys:['반복','비트','전자','신스','repetitive','beat','electronic','synth'],genres:['electronic','hiphop'],ko:'반복적인 비트 기반 사운드네요',en:'Repetitive, beat-driven sound'},
  {keys:['퍼포먼스','군무','아이돌','choreo','performance','idol'],genres:['kpop'],ko:'완벽한 퍼포먼스의 음악이네요',en:'Music built around perfect performance'},
];
function runAISuggest(q){
  const lower = q.toLowerCase();
  for(const r of AI_RULES){ if(r.keys.some(k=>lower.includes(k))) return r; }
  return null;
}
function renderSearch(){
  const q = searchQuery.trim();
  let results = [], ai = null;
  if(q){
    const lower = q.toLowerCase();
    results = SONGS.filter(s=>s.title.toLowerCase().includes(lower)||s.artist.toLowerCase().includes(lower));
    ai = runAISuggest(q);
  }
  const examples = ['빠르고 시끄러운 기타','느리고 감성적인','반복적인 비트','완벽한 퍼포먼스'];
  let body;
  if(!q){
    body = `<div class="empty-state"><div class="es-emoji">▲</div>${t('곡명·아티스트를 검색하거나, 느낌을 설명해보세요','Search a song / artist, or describe a vibe')}</div>`;
  } else {
    const aiHTML = ai ? `<div class="ai-result">
      <div class="ai-q">[SYSTEM] ${t('AI 장르 식별','AI genre detection')}: "${esc(q)}"</div>
      <div class="ai-a">${t(ai.ko,ai.en)} → ${ai.genres.map(id=>{const g=genreById(id);return `<a href="#genre/${g.id}" style="color:${g.color};font-weight:700">${t(g.nameKo,g.name)}</a>`}).join(', ')}</div>
    </div>` : '';

function toggleTasteGenre(id){
  const idx = tasteState.genres.indexOf(id);
  if (idx > -1) {
    tasteState.genres.splice(idx, 1);
  } else {
    if (tasteState.genres.length < 3) {
      tasteState.genres.push(id);
    }
  }
  renderTaste();
}

function selectTasteVibe(id){
  tasteState.vibe = id;
  renderTaste();
}

function selectTasteEra(id){
  tasteState.era = id;
  renderTaste();
}

function nextTasteStep(){
  if (tasteState.step === 1 && tasteState.genres.length === 0) {
    alert(t('최소 1개의 장르를 선택해 주세요!','Please select at least 1 genre!'));
    return;
  }
  tasteState.step++;
  renderTaste();
}

function prevTasteStep(){
  tasteState.step--;
  renderTaste();
}

function calculateTasteDNA(){
  if (!tasteState.vibe) {
    alert(t('음악 분위기를 선택해 주세요!','Please select a music vibe!'));
    return;
  }
  if (!tasteState.era) {
    alert(t('선호하는 시대를 선택해 주세요!','Please select a preferred era!'));
    return;
  }
  tasteState.step = 'result';
  renderTaste();
}

  tasteState = { step:1, genres:[], vibe:'', era:'' };

}

/* ===================== NOW PLAYING / VIBE ANALYZER ===================== */
let npState = { song:null, playing:false, elapsed:0, total:0, timer:null, volume:0.7 };

function getVibeData(song) {
  const hash = (song.id * 17) % 100;
  let tempo = 120;
  let energy = 70 + (hash % 25);
  let mood = 50 + (hash % 41) - 20;
  let organic = 15 + (hash % 70);
  
  if (song.genre === 'pop') {
    tempo = 100 + (hash % 30);
    organic = Math.max(10, organic - 20);
  } else if (song.genre === 'hiphop') {
    tempo = 80 + (hash % 20);
    energy = Math.max(70, energy);
    organic = Math.max(15, organic - 15);
  } else if (song.genre === 'rock') {
    tempo = 115 + (hash % 30);
    energy = Math.max(75, energy);
    organic = Math.max(30, organic + 10);
  } else if (song.genre === 'metal') {
    tempo = 135 + (hash % 40);
    energy = Math.max(85, energy + 10);
    organic = Math.min(25, organic / 2);
  } else if (song.genre === 'electronic') {
    tempo = 120 + (hash % 20);
    organic = Math.min(20, organic / 3);
  } else if (song.genre === 'rnb') {
    tempo = 70 + (hash % 30);
    organic = Math.max(40, organic + 15);
    energy = Math.min(75, energy);
  } else if (song.genre === 'jazz') {
    tempo = 60 + (hash % 50);
    organic = Math.max(70, organic + 30);
    energy = Math.min(60, energy - 10);
  } else if (song.genre === 'classical') {
    tempo = 50 + (hash % 80);
    organic = 95;
    energy = Math.min(50, energy - 20);
  } else if (song.genre === 'kpop') {
    tempo = 110 + (hash % 30);
    organic = Math.max(10, organic - 20);
    energy = Math.max(80, energy);
  } else if (song.genre === 'indie') {
    tempo = 90 + (hash % 40);
    organic = Math.max(45, organic + 15);
  }
  
  tempo = Math.round(tempo);
  energy = Math.min(100, Math.max(0, Math.round(energy)));
  mood = Math.min(100, Math.max(0, Math.round(mood)));
  organic = Math.min(100, Math.max(0, Math.round(organic)));

  const g = genreById(song.genre);
  const genreName = g ? t(g.nameKo, g.name) : song.genre;
  
  let analysisKo = `이 곡은 ${song.year}년에 발표된 ${song.artist}의 작품으로, ${genreName} 장르 특유의 예술적 기법과 고유한 사운드가 돋보입니다. 템포는 ${tempo} BPM으로 안정적이면서도 리드미컬한 긴장감을 유지하며, ${energy}%의 높은 에너지 레벨을 바탕으로 곡의 테마를 힘 있게 전달합니다. 특히 전자 악기와 어쿠스틱 사운드의 비율이 적절히 조화를 이루어, 이 장르를 선호하는 이들의 취향에 아주 잘 부합하는 명곡입니다.`;
  let analysisEn = `Released in ${song.year} by ${song.artist}, this track is a stellar representation of the ${song.genre.toUpperCase()} genre. Clocking in at ${tempo} BPM, it strikes an elegant balance between rhythm and emotional depth. With an energy rating of ${energy}%, it drives its musical theme forward with absolute confidence. The mix showcases a ${organic}% acoustic texture blended with genre-defining elements, offering a rich soundscape for curious ears.`;

  return { tempo, energy, mood, organic, analysisKo, analysisEn };
}

function closeVibeAnalyzer(){
  document.getElementById('vibe-analyzer').classList.remove('open');
}

function renderVibeAnalyzer(){
  const drawer = document.getElementById('vibe-analyzer');
  if(!npState.song){
    drawer.innerHTML = '';
    drawer.classList.remove('open');
    stopVisualizer();
    return;
  }
  const s = npState.song;
  const v = getVibeData(s);
  
  let waveBars = '';
  const barCount = 25;
  for (let i = 0; i < barCount; i++) {
    const h = 8 + Math.round(Math.abs(Math.sin((i / barCount) * Math.PI * 2) * 16)) + (s.id * i % 6);
    waveBars += `<rect class="va-bar va-bar-${i}" x="${i * 7 + 2}" y="${16 - h/2}" width="4.5" height="${h}" rx="1.5"/>`;
  }

  drawer.innerHTML = `
    <div class="va-head">
      <h2>${t('바이브 분석기','Vibe Analyzer')}</h2>
      <button class="va-close" onclick="closeVibeAnalyzer()">${ICON.close}</button>
    </div>
    <div class="va-body">
      <div class="va-song-show">
        <div class="va-art-wrap" style="background:${artGradient(s.genre)}">
          <span style="opacity:0.8">${genreById(s.genre)?.emoji || '🎵'}</span>
        </div>
        <div class="va-title">${esc(s.title)}</div>
        <div class="va-artist">${esc(s.artist)}</div>
        <div style="margin-top:6px">${genreTagHTML(s.genre)}</div>
      </div>
      
      <div class="va-player-ctrl">
        <div class="vap-row">
          <button class="btn-play sm" onclick="togglePlay()">${npState.playing?ICON.pause:ICON.play}</button>
          <span class="vap-time" id="va-elapsed">0:00</span>
          <svg class="va-wave-svg" id="va-wave" onclick="seekWave(event)" viewBox="0 0 180 32">
            ${waveBars}
          </svg>
          <span class="vap-time">${s.duration}</span>
        </div>
      </div>
      
      <!-- Simulated real-time canvas visualizer -->
      <canvas id="va-visualizer" width="360" height="60" style="width:100%; height:60px; background:#050505; border:1px solid var(--border-subtle); display:block; margin: 12px 0 4px; border-radius:6px;"></canvas>

      <div class="va-stats">
        <div class="va-stat-row">
          <div class="va-stat-lbl"><span>${t('에너지 (Energy)','Energy')}</span><span>${v.energy}%</span></div>
          <div class="va-stat-track"><div class="va-stat-fill" style="width:${v.energy}%"></div></div>
        </div>
        <div class="va-stat-row">
          <div class="va-stat-lbl"><span>${t('템포 (Tempo)','Tempo')}</span><span>${v.tempo} BPM</span></div>
          <div class="va-stat-track"><div class="va-stat-fill" style="width:${(v.tempo - 40) / 140 * 100}%"></div></div>
        </div>
        <div class="va-stat-row">
          <div class="va-stat-lbl"><span>${t('어쿠스틱 감성 (Acoustic)','Acoustic Warmth')}</span><span>${v.organic}%</span></div>
          <div class="va-stat-track"><div class="va-stat-fill" style="width:${v.organic}%"></div></div>
        </div>
        <div class="va-stat-row">
          <div class="va-stat-lbl"><span>${t('감정 온도 (Mood)','Emotional Mood')}</span><span>${v.mood > 60 ? t('쾌활함/밝음','Bright/Happy') : t('차분함/어두움','Calm/Moody')} (${v.mood}%)</span></div>
          <div class="va-stat-track"><div class="va-stat-fill" style="width:${v.mood}%"></div></div>
        </div>
      </div>

      <div class="va-anal-text">
        ${t(v.analysisKo, v.analysisEn)}
      </div>
    </div>`;
  
  drawer.classList.add('open');
  updateProgress();
  if (npState.playing) {
    startVisualizer();
  }
}

function playSong(id){
  const song = SONGS.find(s=>s.id===id);
  if(!song) return;
  npState.song = song;
  npState.total = durToSec(song.duration);
  npState.elapsed = 0;
  npState.playing = true;
  renderVibeAnalyzer();
  startTimer();
  startVisualizer();
}

function togglePlay(){
  if(!npState.song) return;
  npState.playing = !npState.playing;
  if(npState.playing) {
    startTimer();
    startVisualizer();
  } else {
    stopTimer();
    stopVisualizer();
  }
  const btn = document.querySelector('.va-player-ctrl .btn-play');
  if(btn) btn.innerHTML = npState.playing ? ICON.pause : ICON.play;
}

function startTimer(){
  stopTimer();
  npState.timer = setInterval(()=>{
    if(npState.elapsed >= npState.total){ nextSong(); return; }
    npState.elapsed++;
    updateProgress();
  }, 1000);
}

/* ===================== NEW PREMIUM UTILITIES & ANIMATIONS ===================== */
let visualizerAnimationId = null;
function startVisualizer() {
  stopVisualizer();
  const canvas = document.getElementById('va-visualizer');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const song = npState.song;
  if (!song) return;
  const vibe = getVibeData(song);
  const genre = genreById(song.genre);
  const color1 = genre ? genre.color : '#00ffff';
  const color2 = genre ? genre.colorSecondary || '#ff00ff' : '#ff00ff';
  
  let frame = 0;
  function draw() {
    if (!npState.playing || !document.getElementById('va-visualizer')) {
      visualizerAnimationId = null;
      return;
    }
    visualizerAnimationId = requestAnimationFrame(draw);
    
    // Clear canvas
    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    const width = canvas.width;
    const height = canvas.height;
    const barWidth = 4;
    const barGap = 3;
    const totalBars = Math.floor(width / (barWidth + barGap));
    
    // Create gradient
    const gradient = ctx.createLinearGradient(0, height, 0, 0);
    gradient.addColorStop(0, color1);
    gradient.addColorStop(1, color2);
    
    frame += (vibe.tempo / 60) * 0.05; // speed depends on tempo
    const energyFactor = vibe.energy / 100;
    
    for (let i = 0; i < totalBars; i++) {
      const wave1 = Math.sin(i * 0.15 + frame) * 0.4;
      const wave2 = Math.sin(i * 0.3 - frame * 1.5) * 0.2;
      const wave3 = Math.cos(i * 0.05 + frame * 0.8) * 0.3;
      
      let noise = (Math.sin(i * 2.3 + frame * 10) * 0.1) * energyFactor;
      
      let amplitude = (wave1 + wave2 + wave3 + 0.5) * energyFactor * 0.8 + 0.1 + noise;
      amplitude = Math.max(0.05, Math.min(1, amplitude));
      
      const barHeight = amplitude * height * 0.85;
      const x = i * (barWidth + barGap);
      const y = height - barHeight;
      
      ctx.fillStyle = gradient;
      ctx.beginPath();
      if (typeof ctx.roundRect === 'function') {
        ctx.roundRect(x, y, barWidth, barHeight, 2);
      } else {
        ctx.rect(x, y, barWidth, barHeight);
      }
      ctx.fill();
    }
  }
  
  visualizerAnimationId = requestAnimationFrame(draw);
}

function stopVisualizer() {
  if (visualizerAnimationId) {
    cancelAnimationFrame(visualizerAnimationId);
    visualizerAnimationId = null;
  }
}

// Live Listener Feed data & functions
const FEED_USERS = ['Lucas', 'Emma', 'Minho', 'Sophia', 'Yuki', 'Oliver', 'Chloe', 'Ji-won', 'Leo', 'Mia', 'Aiden', 'Elena', 'Haruto', 'Amelie'];
const FEED_CITIES = ['Paris', 'Seoul', 'Tokyo', 'London', 'New York', 'Berlin', 'Sydney', 'Toronto', 'Singapore', 'Mumbai', 'Vienna', 'São Paulo'];
let liveFeedIntervalId = null;

function updateLiveFeed() {
  const container = document.getElementById('live-feed-container');
  if (!container) return;
  
  const user = FEED_USERS[Math.floor(Math.random() * FEED_USERS.length)];
  const city = FEED_CITIES[Math.floor(Math.random() * FEED_CITIES.length)];
  const song = SONGS[Math.floor(Math.random() * SONGS.length)];
  const actionType = Math.random() > 0.4 ? 'play' : 'fav';
  
  let textKo = '', textEn = '';
  if (actionType === 'play') {
    textKo = `${user} (${city}) 님이 <span class="feed-song" onclick="playSong(${song.id})" style="color:var(--accent-cyan); cursor:pointer; font-weight:700; text-decoration:underline">${esc(song.title)}</span> 재생 시작`;
    textEn = `${user} in ${city} started playing <span class="feed-song" onclick="playSong(${song.id})" style="color:var(--accent-cyan); cursor:pointer; font-weight:700; text-decoration:underline">${esc(song.title)}</span>`;
  } else {
    textKo = `${user} (${city}) 님이 <span class="feed-song" onclick="playSong(${song.id})" style="color:var(--accent-cyan); cursor:pointer; font-weight:700; text-decoration:underline">${esc(song.title)}</span> 곡을 최애 저장!`;
    textEn = `${user} in ${city} favorited <span class="feed-song" onclick="playSong(${song.id})" style="color:var(--accent-cyan); cursor:pointer; font-weight:700; text-decoration:underline">${esc(song.title)}</span>`;
  }
  
  const item = document.createElement('div');
  item.className = 'live-feed-item';
  item.style.fontSize = '11.5px';
  item.style.borderBottom = '1px solid var(--border-subtle)';
  item.style.padding = '8px 0';
  item.style.display = 'flex';
  item.style.justifyContent = 'space-between';
  item.style.alignItems = 'center';
  
  const textSpan = document.createElement('span');
  textSpan.innerHTML = currentLang === 'ko' ? textKo : textEn;
  textSpan.dataset.ko = textKo;
  textSpan.dataset.en = textEn;
  textSpan.className = 'feed-text';
  
  const timeSpan = document.createElement('span');
  timeSpan.style.color = 'var(--text-muted)';
  timeSpan.style.fontSize = '9px';
  timeSpan.style.fontFamily = 'var(--font-mono)';
  timeSpan.textContent = t('방금 전', 'just now');
  timeSpan.dataset.ko = '방금 전';
  timeSpan.dataset.en = 'just now';
  
  item.appendChild(textSpan);
  item.appendChild(timeSpan);
  
  container.insertBefore(item, container.firstChild);
  
  while (container.children.length > 5) {
    container.removeChild(container.lastChild);
  }
  
  for (let i = 1; i < container.children.length; i++) {
    const ts = container.children[i].querySelector('span:last-child');
    if (ts) {
      const secs = i * 4;
      ts.textContent = currentLang === 'ko' ? `${secs}초 전` : `${secs}s ago`;
      ts.dataset.ko = `${secs}초 전`;
      ts.dataset.en = `${secs}s ago`;
    }
  }
}

function startLiveFeedLoop() {
  if (liveFeedIntervalId) clearInterval(liveFeedIntervalId);
  const container = document.getElementById('live-feed-container');
  if (container) {
    container.innerHTML = '';
    for (let i = 0; i < 4; i++) {
      updateLiveFeed();
    }
  }
  liveFeedIntervalId = setInterval(updateLiveFeed, 3500);
}

// Mood Radio matching & play
function playMoodRadio(mood) {
  let candidates = [];
  if (mood === 'chill') {
    candidates = SONGS.filter(s => {
      const v = getVibeData(s);
      return v.energy < 70 && v.tempo < 105;
    });
  } else if (mood === 'hype') {
    candidates = SONGS.filter(s => {
      const v = getVibeData(s);
      return v.energy >= 70 && v.tempo >= 105;
    });
  } else if (mood === 'emotional') {
    candidates = SONGS.filter(s => {
      const v = getVibeData(s);
      return v.organic >= 35 && v.energy < 75;
    });
  } else if (mood === 'intense') {
    candidates = SONGS.filter(s => {
      const v = getVibeData(s);
      return v.energy >= 80;
    });
  }
  
  if (candidates.length === 0) candidates = SONGS;
  const chosen = candidates[Math.floor(Math.random() * candidates.length)];
  playSong(chosen.id);
}

// Stats animations
function animateValue(id, start, end, duration, isCompact = false) {
  const obj = document.getElementById(id);
  if (!obj) return;
  let startTimestamp = null;
  const step = (timestamp) => {
    if (!startTimestamp) startTimestamp = timestamp;
    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
    const current = Math.floor(progress * (end - start) + start);
    if (isCompact) {
      obj.textContent = fmtListeners(current);
    } else {
      obj.textContent = current.toLocaleString();
    }
    if (progress < 1) {
      window.requestAnimationFrame(step);
    }
  }
  window.requestAnimationFrame(step);
}

function animateHomeStats() {
  const activeListeners = 142580 + Math.floor(Math.random() * 100);
  const dailyStreams = 12840920 + Math.floor(Math.random() * 1000);
  
  animateValue('stat-listeners', 0, activeListeners, 1000, true);
  animateValue('stat-streams', 0, dailyStreams, 1200, false);
}

function stopTimer(){ if(npState.timer){ clearInterval(npState.timer); npState.timer=null; } }

function stepSong(dir){
  if(!npState.song) return;
  const idx = SONGS.findIndex(s=>s.id===npState.song.id);
  const next = SONGS[(idx + dir + SONGS.length) % SONGS.length];
  playSong(next.id);
}
function nextSong(){ stepSong(1); }
function prevSong(){
  if(npState.elapsed > 3){ npState.elapsed=0; updateProgress(); return; }
  stepSong(-1);
}

function updateProgress(){
  const el = document.getElementById('va-elapsed');
  if(el) el.textContent = secToDur(npState.elapsed);
  
  const wave = document.getElementById('va-wave');
  if(wave){
    const pct = npState.elapsed / npState.total;
    const barCount = 25;
    const activeIndex = Math.floor(pct * barCount);
    for (let i = 0; i < barCount; i++) {
      const bar = wave.querySelector(`.va-bar-${i}`);
      if(bar){
        if (i <= activeIndex) {
          bar.setAttribute('fill', 'var(--accent-cyan)');
        } else {
          bar.setAttribute('fill', 'rgba(255, 255, 255, 0.15)');
        }
      }
    }
  }
}

function seekWave(e){
  const r = document.getElementById('va-wave').getBoundingClientRect();
  npState.elapsed = Math.round((e.clientX-r.left)/r.width*npState.total);
  updateProgress();
}

  document.querySelectorAll('[data-ko]').forEach(el => {

}
